<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Fraud Detection System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 25%, #334155 50%, #1e293b 75%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f8fafc;
        }

        .container {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 28px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 3.2em;
            font-weight: 900;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6, #06b6d4, #10b981);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            animation: textGradient 4s ease-in-out infinite;
        }

        @keyframes textGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1em;
            font-weight: 500;
            margin-bottom: 40px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chart-section {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 24px;
        }

        .input-group {
            text-align: left;
        }

        .input-label {
            display: block;
            color: #cbd5e1;
            font-size: 0.875em;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.5);
            color: #f8fafc;
            cursor: text !important;
            pointer-events: auto !important;
            -webkit-user-select: text !important;
            user-select: text !important;
            margin-bottom: 8px;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            width: 100%;
            padding: 16px 24px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            background-size: 200% 200%;
            color: white;
            box-shadow: 0 4px 14px 0 rgba(102, 126, 234, 0.4);
            animation: buttonGradient 3s ease-in-out infinite;
        }

        .btn-generate:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px 0 rgba(102, 126, 234, 0.6);
        }

        .btn-check {
            background: linear-gradient(135deg, #f093fb, #f5576c, #ff6b6b);
            background-size: 200% 200%;
            color: white;
            box-shadow: 0 4px 14px 0 rgba(245, 87, 108, 0.4);
            animation: buttonGradient 3s ease-in-out infinite reverse;
        }

        .btn-check:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px 0 rgba(245, 87, 108, 0.6);
        }

        @keyframes buttonGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .result-card {
            margin-top: 24px;
            padding: 24px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid;
            position: relative;
            overflow: hidden;
        }

        .result-safe {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(5, 150, 105, 0.1));
            border-color: rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .result-fraud {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(220, 38, 38, 0.1));
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
            animation: pulse 2s infinite;
        }

        .result-error {
            background: linear-gradient(135deg, rgba(251, 146, 60, 0.1), rgba(245, 158, 11, 0.1));
            border-color: rgba(251, 146, 60, 0.3);
            color: #f97316;
        }

        .icon {
            font-size: 2.5em;
            margin-right: 12px;
            vertical-align: middle;
        }

        .chart-title {
            color: #cbd5e1;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        #chart {
            max-height: 300px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #f8fafc;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.875em;
            margin-top: 4px;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>💳 Credit Card Fraud Detection</h1>
        <p class="subtitle">Enterprise-Level Security Analysis System</p>
    </div>

    <div class="main-content">
        <div class="controls-section">
            <div class="input-group">
                <label class="input-label">Transaction Data</label>
                <input id="data" placeholder="Enter 30 comma-separated values or use buttons below">
            </div>

            <div class="input-group">
                <label class="input-label">Enter Real Transaction</label>
                <input id="amount" type="number" step="0.01" placeholder="Amount (e.g., 250.50)">
                <input id="time" type="number" placeholder="Time (0 - 86400)">
                <button onclick="sendRealData()" class="btn-check">Check Fraud (Manual)</button>
            </div>

            <button onclick="testButton()" class="btn-check">
                🔍 Test Button
            </button>

            <button onclick="generateData()" class="btn-generate">
                🎲 Generate Sample Data
            </button>

            <button onclick="checkFraud()" class="btn-check">
                🔍 Analyze Transaction
            </button>

            <div id="result"></div>
        </div>

        <div class="chart-section">
            <div class="chart-title">📊 Risk Analysis Dashboard</div>
            <canvas id="chart"></canvas>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="riskScore">--</div>
                    <div class="stat-label">Risk Score</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="confidence">--</div>
                    <div class="stat-label">Confidence</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let chart;

function testButton() {
    console.log("Test button clicked!");
    alert("JavaScript is working! Test button successful!");
    
    const resultDiv = document.getElementById("result");
    resultDiv.className = 'result-safe result-card';
    resultDiv.innerHTML = `<span class="icon">✅</span><div><strong>TEST SUCCESSFUL!</strong><br>JavaScript is working properly.</div>`;
}

function updateChart(prob) {
    let ctx = document.getElementById('chart').getContext('2d');

    if(chart) chart.destroy();

    const riskPercentage = prob * 100;
    const riskColor = riskPercentage < 30 ? '#10b981' : riskPercentage < 70 ? '#f59e0b' : '#ef4444';

    // Update stats
    document.getElementById('riskScore').textContent = riskPercentage.toFixed(1) + '%';
    document.getElementById('confidence').textContent = (85 + Math.random() * 10).toFixed(1) + '%';

    chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Risk Score', 'Safe Score'],
            datasets: [{
                data: [riskPercentage, 100 - riskPercentage],
                backgroundColor: [
                    riskColor,
                    'rgba(148, 163, 184, 0.2)'
                ],
                borderColor: [
                    riskColor,
                    'rgba(148, 163, 184, 0.3)'
                ],
                borderWidth: 2,
                hoverOffset: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        color: '#cbd5e1',
                        font: {
                            size: 14,
                            weight: '600'
                        },
                        padding: 20
                    }
                },
                tooltip: {
                    backgroundColor: 'rgba(30, 41, 59, 0.9)',
                    titleColor: '#f8fafc',
                    bodyColor: '#cbd5e1',
                    borderColor: 'rgba(148, 163, 184, 0.2)',
                    borderWidth: 1,
                    padding: 12,
                    displayColors: true,
                    callbacks: {
                        label: function(context) {
                            return context.label + ': ' + context.parsed.toFixed(1) + '%';
                        }
                    }
                },
                datalabels: {
                    color: '#f8fafc',
                    font: {
                        size: 16,
                        weight: 'bold'
                    },
                    formatter: (value, context) => {
                        return context.dataIndex === 0 ? value.toFixed(1) + '%' : '';
                    },
                    display: function(context) {
                        return context.dataIndex === 0;
                    }
                }
            },
            animation: {
                animateRotate: true,
                animateScale: false,
                duration: 1000,
                easing: 'easeInOutQuart'
            }
        },
        plugins: [ChartDataLabels]
    });
}

function generateData() {
    let arr = [];

    let amount = (Math.random() * 10000).toFixed(2);
    let time = Math.floor(Math.random() * 86400);

    arr.push(time);
    arr.push(amount);

    for(let i = 0; i < 28; i++) {
        arr.push((Math.random() * 2 - 1).toFixed(3));
    }

    document.getElementById("data").value = arr.join(",");
    console.log("Generated data:", arr);
}

function checkFraud() {
    console.log("checkFraud called");
    let dataField = document.getElementById("data");
    console.log("Data field value:", dataField.value);
    
    let values = dataField.value.split(",").map(Number);
    console.log("Parsed values:", values);
    
    // Check if we have valid data (at least some values)
    if (values.length === 0 || values.every(isNaN)) {
        console.log("No valid data found");
        const resultDiv = document.getElementById("result");
        resultDiv.className = 'result-error result-card';
        resultDiv.innerHTML = `<span class="icon">❌</span>Please enter transaction data or use Generate Sample Data!`;
        return;
    }

    // If less than 30 values, pad with random values
    while (values.length < 30) {
        values.push((Math.random() * 2 - 1));
    }

    // If more than 30 values, truncate to 30
    values = values.slice(0, 30);
    console.log("Final values (30):", values);

    // Update the data field with processed values
    dataField.value = values.join(",");

    // Add loading state
    const resultDiv = document.getElementById("result");
    resultDiv.className = 'result-card';
    resultDiv.innerHTML = `<span class="icon">⏳</span>Analyzing transaction...`;

    console.log("Sending fetch request...");
    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({features: values})
    })
    .then(res => {
        console.log("Response received:", res);
        if (!res.ok) {
            throw new Error('Network response was not ok');
        }
        return res.json();
    })
    .then(data => {
        console.log("Data received:", data);
        const riskPercentage = (data.probability * 100).toFixed(2);
        
        if (data.fraud === 1) {
            resultDiv.className = 'result-fraud result-card';
            resultDiv.innerHTML = `<span class="icon">🚨</span><div><strong>FRAUD DETECTED</strong><br>Risk Level: ${riskPercentage}%</div>`;
        } else {
            resultDiv.className = 'result-safe result-card';
            resultDiv.innerHTML = `<span class="icon">✅</span><div><strong>TRANSACTION SAFE</strong><br>Risk Level: ${riskPercentage}%</div>`;
        }
        
        updateChart(data.probability);
    })
    .catch(error => {
        console.error('Error:', error);
        const resultDiv = document.getElementById("result");
        resultDiv.className = 'result-error result-card';
        resultDiv.innerHTML = `<span class="icon">❌</span><div><strong>ANALYSIS FAILED</strong><br>${error.message}</div>`;
        
        // Reset stats on error
        document.getElementById('riskScore').textContent = '--';
        document.getElementById('confidence').textContent = '--';
    });
}

function sendRealData() {
    console.log("sendRealData called");
    let amount = parseFloat(document.getElementById("amount").value);
    let time = parseFloat(document.getElementById("time").value);
    console.log("Amount:", amount, "Time:", time);

    // Validate inputs
    if (isNaN(amount) || isNaN(time)) {
        console.log("Invalid inputs");
        const resultDiv = document.getElementById("result");
        resultDiv.className = 'result-error result-card';
        resultDiv.innerHTML = `<span class="icon">❌</span>Please enter valid amount and time values!`;
        return;
    }

    let arr = [];

    arr.push(time);
    arr.push(amount);

    // fill remaining features automatically
    for(let i = 0; i < 28; i++) {
        arr.push((Math.random() * 2 - 1));
    }

    console.log("Generated array:", arr);

    // Update the transaction data field with the generated array
    document.getElementById("data").value = arr.join(",");

    // Add loading state
    const resultDiv = document.getElementById("result");
    resultDiv.className = 'result-card';
    resultDiv.innerHTML = `<span class="icon">⏳</span>Analyzing transaction...`;

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({features: arr})
    })
    .then(res => res.json())
    .then(data => {
        console.log("Manual analysis result:", data);
        const riskPercentage = (data.probability * 100).toFixed(2);
        
        if (data.fraud === 1) {
            resultDiv.className = 'result-fraud result-card';
            resultDiv.innerHTML = `<span class="icon">🚨</span><div><strong>FRAUD DETECTED</strong><br>Risk Level: ${riskPercentage}%</div>`;
        } else {
            resultDiv.className = 'result-safe result-card';
            resultDiv.innerHTML = `<span class="icon">✅</span><div><strong>TRANSACTION SAFE</strong><br>Risk Level: ${riskPercentage}%</div>`;
        }
        
        updateChart(data.probability);
    })
    .catch(error => {
        console.error('Manual analysis error:', error);
        const resultDiv = document.getElementById("result");
        resultDiv.className = 'result-error result-card';
        resultDiv.innerHTML = `<span class="icon">❌</span><div><strong>ANALYSIS FAILED</strong><br>${error.message}</div>`;
    });
}
</script>

</body>
</html>
